name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  rust-architecture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install pinned nightly toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: nightly-2026-01-22
          components: rust-src, rustc-dev, llvm-tools-preview

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Install cargo_pup
        run: cargo +nightly-2026-01-22 install cargo_pup --version 0.1.7 --locked

      - name: Run architecture guard
        run: ./scripts/verify_arch.sh

  frontend-test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile

      - name: Run frontend tests
        run: bun run --cwd frontend test

      - name: Build frontend
        run: bun run --cwd frontend build

  rust-test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build Docker image
        run: docker build -t aiwattcoach:ci .
