name: Release Manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag in format vX.Y.Z
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must match vX.Y.Z"
            exit 1
          fi

      - name: Validate Cargo version matches tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | cut -d '"' -f 2)
          if [ "${VERSION#v}" != "$CARGO_VERSION" ]; then
            echo "Tag $VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Ensure tag does not exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git show-ref --verify --quiet "refs/tags/$VERSION"; then
            echo "Tag $VERSION already exists"
            exit 1
          fi

      - name: Run tests
        run: cargo test

      - name: Build Docker image
        run: docker build -t aiwattcoach:release .

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
