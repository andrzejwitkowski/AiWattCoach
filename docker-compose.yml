services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      APP_NAME: AiWattCoach
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3002
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: aiwattcoach
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:3002/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet mongodb://127.0.0.1:27017/test --eval 'quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)' "]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
