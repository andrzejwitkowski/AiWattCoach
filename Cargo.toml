[package]
name = "aiwattcoach"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8.4"
dotenvy = "0.15.7"
mongodb = "3.2.4"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
tokio = { version = "1.45.1", features = ["macros", "net", "rt-multi-thread", "signal", "time"] }

[dev-dependencies]
tower = { version = "0.5.2", features = ["util"] }
