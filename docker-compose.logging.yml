# Deploy this stack as a separate Coolify resource in the same environment as the app.
# Then set the existing app resource to use:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
#   OTEL_EXPORTER_OTLP_PROTOCOL=grpc

services:
  loki:
    image: grafana/loki:3.5.0
    command: ["-config.file=/etc/loki/config.yaml"]
    expose:
      - "3100"
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/var/lib/loki
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  tempo:
    image: grafana/tempo:2.8.2
    command: ["-config.file=/etc/tempo/config.yaml"]
    expose:
      - "3200"
      - "4317"
      - "4318"
    volumes:
      - ./docker/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/lib/tempo
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  alloy:
    image: grafana/alloy:v1.8.3
    command: ["run", "/etc/alloy/config.alloy"]
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
    expose:
      - "4317"
      - "4318"
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.6.1
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
    expose:
      - "3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
    volumes:
      - ./docker/grafana/provisioning/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  loki_data:
  tempo_data:
  grafana_data:
